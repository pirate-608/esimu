name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Build binaries
        run: |
          mkdir -p dist
          bun build src/cli.ts --compile --target=bun-linux-x64    --outfile dist/esimu
          bun build src/cli.ts --compile --target=bun-darwin-arm64 --outfile dist/esimu-darwin-arm64
          bun build src/cli.ts --compile --target=bun-windows-x64  --outfile dist/esimu.exe

      - name: Rename & archive
        run: |
          mv dist/esimu dist/esimu-linux-x64
          tar -czf esimu-linux-x64.tar.gz  -C dist esimu-linux-x64
          tar -czf esimu-darwin-arm64.tar.gz -C dist esimu-darwin-arm64
          zip -j esimu-windows-x64.zip dist/esimu.exe

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            esimu-linux-x64.tar.gz
            esimu-darwin-arm64.tar.gz
            esimu-windows-x64.zip
          generate_release_notes: true
